<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080408"/>
      <stop offset="50%" stop-color="#140a10"/>
      <stop offset="100%" stop-color="#080408"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb366"/>
      <stop offset="100%" stop-color="#fa5c40"/>
    </linearGradient>
    <linearGradient id="orb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fa8e41"/>
      <stop offset="100%" stop-color="#e8662a"/>
    </linearGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg4)"/>

  <!-- Large ambient glows -->
  <circle cx="400" cy="280" r="250" fill="#fa5c40" opacity="0.12" filter="url(#glow6)"/>
  <circle cx="250" cy="380" r="180" fill="#e8662a" opacity="0.09" filter="url(#glow6)"/>
  <circle cx="600" cy="180" r="160" fill="#ffb366" opacity="0.08" filter="url(#glow6)"/>

  <!-- Thick concentric rings -->
  <g transform="translate(400, 280)">
    <circle r="240" fill="none" stroke="#fa8e41" stroke-width="2" stroke-opacity="0.12"/>
    <circle r="195" fill="none" stroke="#ffb366" stroke-width="2.5" stroke-opacity="0.15"/>
    <circle r="150" fill="none" stroke="#fa5c40" stroke-width="3" stroke-opacity="0.2"/>
    <circle r="105" fill="none" stroke="#fa8e41" stroke-width="3.5" stroke-opacity="0.28"/>
    <circle r="65" fill="none" stroke="#ffb366" stroke-width="4" stroke-opacity="0.35"/>
    <circle r="28" fill="none" stroke="#fa5c40" stroke-width="4.5" stroke-opacity="0.5"/>
    <!-- Filled center disc -->
    <circle r="12" fill="url(#orb1)" opacity="0.8"/>
    <circle r="20" fill="#fa5c40" opacity="0.25" filter="url(#glow8)"/>
  </g>

  <!-- Large orbital blobs (not just dots) -->
  <g>
    <!-- Outer ring — big filled circles -->
    <circle cx="600" cy="150" r="16" fill="url(#orb2)" opacity="0.55"/>
    <circle cx="600" cy="150" r="30" fill="#fa8e41" opacity="0.12" filter="url(#glow7)"/>
    <circle cx="195" cy="410" r="14" fill="url(#orb1)" opacity="0.5"/>
    <circle cx="195" cy="410" r="26" fill="#fa8e41" opacity="0.1" filter="url(#glow7)"/>
    <circle cx="400" cy="40" r="12" fill="#ffb366" opacity="0.5"/>
    <circle cx="400" cy="40" r="22" fill="#ffb366" opacity="0.1" filter="url(#glow7)"/>

    <!-- Mid rings -->
    <circle cx="570" cy="380" r="15" fill="url(#orb1)" opacity="0.55"/>
    <circle cx="570" cy="380" r="28" fill="#ffb366" opacity="0.12" filter="url(#glow7)"/>
    <circle cx="240" cy="170" r="13" fill="#fa5c40" opacity="0.6"/>
    <circle cx="240" cy="170" r="24" fill="#fa5c40" opacity="0.12" filter="url(#glow7)"/>
    <circle cx="290" cy="380" r="17" fill="url(#orb2)" opacity="0.55"/>
    <circle cx="290" cy="380" r="30" fill="#fa5c40" opacity="0.12" filter="url(#glow7)"/>
    <circle cx="530" cy="190" r="14" fill="#ffb366" opacity="0.5"/>
    <circle cx="530" cy="190" r="25" fill="#ffb366" opacity="0.1" filter="url(#glow7)"/>

    <!-- Inner rings -->
    <circle cx="330" cy="210" r="10" fill="#fa8e41" opacity="0.65"/>
    <circle cx="330" cy="210" r="18" fill="#fa8e41" opacity="0.1" filter="url(#glow8)"/>
    <circle cx="480" cy="360" r="11" fill="#fa5c40" opacity="0.6"/>
    <circle cx="480" cy="360" r="20" fill="#fa5c40" opacity="0.1" filter="url(#glow8)"/>
    <circle cx="440" cy="225" r="9" fill="#ffb366" opacity="0.7"/>
    <circle cx="440" cy="225" r="16" fill="#ffb366" opacity="0.12" filter="url(#glow8)"/>
    <circle cx="365" cy="340" r="9" fill="#fa8e41" opacity="0.65"/>
    <circle cx="365" cy="340" r="16" fill="#fa8e41" opacity="0.1" filter="url(#glow8)"/>
  </g>

  <!-- Connecting lines — thicker -->
  <g stroke="#fa8e41" stroke-width="1.5" stroke-opacity="0.18">
    <line x1="600" y1="150" x2="530" y2="190"/>
    <line x1="530" y1="190" x2="440" y2="225"/>
    <line x1="440" y1="225" x2="400" y2="280"/>
    <line x1="400" y1="280" x2="365" y2="340"/>
    <line x1="365" y1="340" x2="290" y2="380"/>
    <line x1="290" y1="380" x2="195" y2="410"/>
    <line x1="570" y1="380" x2="480" y2="360"/>
    <line x1="480" y1="360" x2="400" y2="280"/>
    <line x1="330" y1="210" x2="400" y2="280"/>
    <line x1="240" y1="170" x2="330" y2="210"/>
    <line x1="400" y1="40" x2="530" y2="190"/>
    <line x1="400" y1="40" x2="330" y2="210"/>
    <line x1="240" y1="170" x2="195" y2="410" stroke-opacity="0.08"/>
    <line x1="600" y1="150" x2="570" y2="380" stroke-opacity="0.08"/>
  </g>

  <!-- Solid filled shapes (heavier) -->
  <polygon points="105,140 140,75 175,140" fill="#fa8e41" fill-opacity="0.15" stroke="#fa8e41" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="640" y="105" width="45" height="45" rx="4" fill="#ffb366" fill-opacity="0.12" stroke="#ffb366" stroke-width="1.5" stroke-opacity="0.35" transform="rotate(20, 662, 127)"/>
  <polygon points="665,460 692,410 719,460" fill="#fa5c40" fill-opacity="0.15" stroke="#fa5c40" stroke-width="1.5" stroke-opacity="0.4"/>
  <polygon points="78,405 102,380 132,390 132,420 102,430" fill="#ffb366" fill-opacity="0.1" stroke="#ffb366" stroke-width="1.2" stroke-opacity="0.3"/>
  <polygon points="475,68 498,54 521,68 521,94 498,108 475,94" fill="#fa5c40" fill-opacity="0.1" stroke="#fa5c40" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- Sine waves — bolder -->
  <path d="M30,490 Q90,450 150,490 Q210,530 270,490 Q330,450 390,490 Q450,530 510,490 Q570,450 630,490 Q690,530 750,490" fill="none" stroke="#fa8e41" stroke-width="2.5" stroke-opacity="0.3"/>
  <path d="M30,515 Q90,480 150,515 Q210,550 270,515 Q330,480 390,515 Q450,550 510,515 Q570,480 630,515 Q690,550 750,515" fill="none" stroke="#ffb366" stroke-width="2" stroke-opacity="0.22"/>
  <path d="M30,538 Q90,510 150,538 Q210,566 270,538 Q330,510 390,538 Q450,566 510,538 Q570,510 630,538 Q690,566 750,538" fill="none" stroke="#fa5c40" stroke-width="1.5" stroke-opacity="0.16"/>

  <!-- Scattered particles -->
  <g fill="#fa8e41" opacity="0.45">
    <circle cx="70" cy="250" r="2.5"/>
    <circle cx="730" cy="300" r="2.5"/>
    <circle cx="750" cy="200" r="3"/>
    <circle cx="60" cy="350" r="2.5"/>
    <circle cx="50" cy="500" r="2.5"/>
    <circle cx="740" cy="470" r="2.5"/>
  </g>
  <g fill="#ffb366" opacity="0.35">
    <circle cx="130" cy="510" r="2.5"/>
    <circle cx="350" cy="560" r="2.5"/>
    <circle cx="600" cy="550" r="2.5"/>
    <circle cx="720" cy="80" r="2.5"/>
    <circle cx="80" cy="80" r="2.5"/>
  </g>
</svg>