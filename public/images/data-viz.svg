<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="50%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffb366"/>
      <stop offset="100%" stop-color="#fa5c40"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fa8e41"/>
      <stop offset="100%" stop-color="#e8662a"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg3)"/>

  <!-- Ambient glows -->
  <circle cx="300" cy="350" r="200" fill="#fa5c40" opacity="0.06" filter="url(#glow4)"/>
  <circle cx="550" cy="250" r="150" fill="#ffb366" opacity="0.05" filter="url(#glow4)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="0.5">
    <line x1="120" y1="450" x2="700" y2="450"/>
    <line x1="120" y1="370" x2="700" y2="370"/>
    <line x1="120" y1="290" x2="700" y2="290"/>
    <line x1="120" y1="210" x2="700" y2="210"/>
    <line x1="120" y1="130" x2="700" y2="130"/>
  </g>

  <!-- Bar chart -->
  <g>
    <rect x="160" y="340" width="40" height="110" rx="4" fill="url(#bar1)" opacity="0.75"/>
    <rect x="220" y="260" width="40" height="190" rx="4" fill="url(#bar2)" opacity="0.65"/>
    <rect x="280" y="300" width="40" height="150" rx="4" fill="url(#bar1)" opacity="0.55"/>
    <rect x="340" y="200" width="40" height="250" rx="4" fill="url(#bar2)" opacity="0.75"/>
    <rect x="400" y="170" width="40" height="280" rx="4" fill="url(#bar1)" opacity="0.85"/>
    <rect x="460" y="230" width="40" height="220" rx="4" fill="url(#bar2)" opacity="0.6"/>
    <rect x="520" y="280" width="40" height="170" rx="4" fill="url(#bar1)" opacity="0.65"/>
    <rect x="580" y="150" width="40" height="300" rx="4" fill="url(#bar2)" opacity="0.8"/>
    <rect x="640" y="310" width="40" height="140" rx="4" fill="url(#bar1)" opacity="0.55"/>
  </g>

  <!-- Bar top glows -->
  <g>
    <rect x="395" y="168" width="50" height="6" rx="3" fill="#ffb366" opacity="0.15" filter="url(#glow5)"/>
    <rect x="575" y="148" width="50" height="6" rx="3" fill="#fa8e41" opacity="0.15" filter="url(#glow5)"/>
    <rect x="335" y="198" width="50" height="6" rx="3" fill="#fa8e41" opacity="0.12" filter="url(#glow5)"/>
  </g>

  <!-- Glow under bars -->
  <ellipse cx="410" cy="455" rx="280" ry="18" fill="#fa5c40" opacity="0.12" filter="url(#glow5)"/>

  <!-- Connection line (trend) -->
  <polyline points="180,340 240,260 300,300 360,200 420,170 480,230 540,280 600,150 660,310"
    fill="none" stroke="#ffb366" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots on line -->
  <g>
    <circle cx="180" cy="340" r="3.5" fill="#ffb366" opacity="0.65"/>
    <circle cx="240" cy="260" r="3.5" fill="#ffb366" opacity="0.65"/>
    <circle cx="300" cy="300" r="3.5" fill="#ffb366" opacity="0.65"/>
    <circle cx="360" cy="200" r="4" fill="#ffb366" opacity="0.75"/>
    <circle cx="360" cy="200" r="10" fill="#ffb366" opacity="0.08" filter="url(#glow5)"/>
    <circle cx="420" cy="170" r="4.5" fill="#ffb366" opacity="0.85"/>
    <circle cx="420" cy="170" r="12" fill="#ffb366" opacity="0.1" filter="url(#glow5)"/>
    <circle cx="480" cy="230" r="3.5" fill="#ffb366" opacity="0.65"/>
    <circle cx="540" cy="280" r="3.5" fill="#ffb366" opacity="0.65"/>
    <circle cx="600" cy="150" r="4.5" fill="#ffb366" opacity="0.8"/>
    <circle cx="600" cy="150" r="12" fill="#ffb366" opacity="0.1" filter="url(#glow5)"/>
    <circle cx="660" cy="310" r="3.5" fill="#ffb366" opacity="0.65"/>
  </g>

  <!-- Floating data nodes (top area) -->
  <g>
    <circle cx="200" cy="100" r="22" fill="none" stroke="#fa8e41" stroke-width="1" stroke-opacity="0.22"/>
    <circle cx="200" cy="100" r="5" fill="#fa8e41" opacity="0.5"/>
    <circle cx="350" cy="80" r="16" fill="none" stroke="#ffb366" stroke-width="1" stroke-opacity="0.18"/>
    <circle cx="350" cy="80" r="4" fill="#ffb366" opacity="0.4"/>
    <circle cx="550" cy="90" r="20" fill="none" stroke="#fa5c40" stroke-width="1" stroke-opacity="0.22"/>
    <circle cx="550" cy="90" r="5" fill="#fa5c40" opacity="0.5"/>
    <circle cx="680" cy="100" r="14" fill="none" stroke="#ffb366" stroke-width="1" stroke-opacity="0.18"/>
    <circle cx="680" cy="100" r="3.5" fill="#ffb366" opacity="0.4"/>
    <!-- Connection lines between nodes -->
    <line x1="222" y1="100" x2="334" y2="80" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.1"/>
    <line x1="366" y1="80" x2="530" y2="90" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.1"/>
    <line x1="570" y1="90" x2="666" y2="100" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.1"/>
    <!-- Node to chart connections -->
    <line x1="200" y1="122" x2="180" y2="340" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05" stroke-dasharray="4,4"/>
    <line x1="550" y1="110" x2="600" y2="150" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05" stroke-dasharray="4,4"/>
  </g>

  <!-- Scatter dots -->
  <g fill="#fa8e41" opacity="0.25">
    <circle cx="190" cy="380" r="2"/>
    <circle cx="270" cy="420" r="1.5"/>
    <circle cx="380" cy="390" r="2"/>
    <circle cx="450" cy="410" r="1.5"/>
    <circle cx="530" cy="430" r="2"/>
    <circle cx="620" cy="400" r="1.5"/>
  </g>

  <!-- Axis lines -->
  <g fill="#ffffff" opacity="0.1">
    <rect x="120" y="449" width="580" height="1"/>
    <rect x="120" y="130" width="1" height="320"/>
  </g>
</svg>